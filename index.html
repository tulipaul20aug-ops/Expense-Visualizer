<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Analytics</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<nav class="navbar">
<div class="logo">Expense Analytics</div>

<div class="nav-links">
<button onclick="showSection('dashboard',this)">Dashboard</button>
<button onclick="showSection('reports',this)">Reports</button>
<button onclick="showSection('settings',this)">Settings</button>

<!-- ✅ DARK MODE BUTTON ADDED (before reset as you wanted) -->
<button id="darkBtn" onclick="toggleDarkMode()">Dark Mode</button>

<button onclick="resetExpenses()">Reset Total</button>
</div>
</nav>

<div id="dashboard" class="content">

<div id="dateDisplay" class="date-box"></div>

<h2 style="margin-bottom:15px;color:#333;">Summary Cards</h2>

<div class="stats-grid">

<div class="card">
<strong>💰 Total Income</strong>
<p id="dispTotal">0</p>
</div>

<div class="card">
<strong>📅 Monthly Income</strong>
<p id="dispMonthly">0</p>
</div>

<div class="card">
<strong>⚠️ Expense Limit</strong>
<p id="dispLimit">0</p>
</div>

<div class="card">
<strong>🏦 Savings</strong>
<p id="dispSavings">0</p>
</div>

</div>

<div class="main-dashboard-grid">

<div class="card chart-container">
<h3>Monthly Analytics</h3>

<!-- ✅ PROGRESS BAR -->
<div class="progress-bar">
<div id="progressFill"></div>
</div>

<canvas id="expenseChart"></canvas>
</div>

<div class="card input-container">

<h3>Add Expense</h3>

<input type="number" id="expenseAmount" placeholder="Amount">

<select id="expenseCategory">
<option value="Food">Food</option>
<option value="Travel">Travel</option>
<option value="Shopping">Shopping</option>
<option value="Housing & Utilities">Housing & Utilities</option>
<option value="Accessories">Accessories</option>
</select>

<input type="date" id="expenseDate">

<button onclick="addExpense()">Add Expense</button>

</div>

</div>

</div>

<div id="reports" class="content" style="display:none;">

<div class="reports-grid">

<div class="card history-card">
<h3>Expense History</h3>
<div id="historyList"></div>
</div>

<div class="right-reports">

<div class="card">
<h3>Expense Breakdown</h3>
<canvas id="reportChart"></canvas>
</div>

<div class="card insights-card">
<h3>Insights Panel</h3>
<div id="insightsBox"></div>
</div>

</div>

</div>

</div>

<div id="settings" class="content" style="display:none;">

<div class="card financials-card">

<h3>Update Financials</h3>

<div class="financials-grid">

<div>
<label>Total Income</label>
<input type="number" id="inputTotal">
</div>

<div>
<label>Monthly Income</label>
<input type="number" id="inputMonthly">
</div>

<div>
<label>Expense Limit</label>
<input type="number" id="inputLimit">
</div>

</div>

<button onclick="updateFinancials()" class="save-btn">
Save Financial Settings
</button>

<button onclick="carryForward()" class="save-btn">
Add Remaining to Next Month
</button>

<br><br>


</div>

</div>

<!-- ✅ MODAL (UNCHANGED) -->
<div id="warningModal" class="modal">
<div class="modal-content">
<h3>Budget Alert!</h3>
<p>You are exceeding your limit. Deducting from savings. Proceed?</p>
<button onclick="confirmExpense(true)">Yes</button>
<button onclick="confirmExpense(false)">No</button>
</div>
</div>

<script src="script.js"></script>

</body>
</html>
